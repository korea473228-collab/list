<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECIAL TASK FORCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { margin: 0; min-height: 100vh; background: #000; color: #fff; padding: 30px 10px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 24px; font-weight: 900; letter-spacing: 0.15em; margin: 0; color: #fff; }
        
        .group-section { width: 100%; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; border-radius: 30px; }
        
        .group-title { 
            font-size: 12px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 4px; 
            margin-bottom: 25px; display: flex; align-items: center; justify-content: center;
            padding: 8px 25px; border-top: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            width: 100%; 
        }
        
        /* 카드 사이즈 대폭 축소 */
        .card { 
            background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; 
            padding: 20px 10px; display: flex; flex-direction: column; align-items: center; 
            text-align: center; width: 160px; min-height: 220px; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-5px); background: rgba(25, 25, 25, 0.9); }
        
        /* 아바타 사이즈 축소 */
        .avatar-box { 
            width: 65px; height: 65px; border-radius: 22px; background: #1a1a1a; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 15px; flex-shrink: 0; 
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-box svg { width: 55%; height: 55%; fill: #333; }
        
        .info { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .info b { display: block; font-size: 16px; margin-bottom: 6px; color: #fff; font-weight: 700; }
        
        /* 뱃지 및 텍스트 축소 */
        .id-badge { 
            display: inline-flex; align-items: center; justify-content: center; 
            background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 9px; 
            font-weight: 800; padding: 2px 8px; border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 12px; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }
        
        .info p { font-size: 11px; color: #777; margin: 0; line-height: 1.4; word-break: keep-all; max-width: 130px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SPECIAL TASK FORCE</h1>
        </div>
        <div id="orgContent"></div>
    </div>

    <script>
        const _u = "aHR0cHM6Ly9oaWFjdXB0cmlnc25zdHloamFmbC5zdXBhYmFzZS5jbw==";
        const _k = "ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1ocFlXTjFjSFJ5YVdkemJuTjBlV2hxWVdac0lpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpVMk5UTTBOellzSW1WNGNDSTZNakE1TVRJeU9UUTNObjAuM081Q2JDU01UeTFNQnFGYUVOQTFScno3V3g0UHNmSmtQM3B2Rk9QWld4UQ==";
        const sb = supabase.createClient(atob(_u), atob(_k));

        const ROLES = [
            { name: "특임대 사령관", color: "#007aff" },
            { name: "특임대 부사령관", color: "#af52de" },
            { name: "특임대 팀장", color: "#34c759" },
            { name: "특임대 팀원", color: "#5856d6" },
            { name: "특임대 수습", color: "#8e8e93" }
        ];

        const DEFAULT_AVATAR = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

        async function fetchAll() {
            const { data, error } = await sb.from('org_members').select('*').order('rank', { ascending: true });
            if (!error) render(data);
        }

        function render(data) {
            const container = document.getElementById('orgContent');
            container.innerHTML = '';

            ROLES.forEach(roleObj => {
                const members = data.filter(m => m.role === roleObj.name);
                if (members.length === 0) return;

                const section = document.createElement('div');
                section.className = 'group-section';
                section.style.background = `linear-gradient(180deg, ${roleObj.color}10 0%, transparent 100%)`;
                
                const title = document.createElement('div');
                title.className = 'group-title';
                title.innerText = roleObj.name;
                title.style.borderColor = `${roleObj.color}30`;
                title.style.background = `linear-gradient(90deg, transparent, ${roleObj.color}20, transparent)`;
                title.style.textShadow = `0 0 10px ${roleObj.color}`;
                
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid';

                members.forEach(m => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.onmouseover = () => { 
                        el.style.borderColor = roleObj.color; 
                        el.style.boxShadow = `0 8px 20px ${roleObj.color}15`; 
                    };
                    el.onmouseout = () => { 
                        el.style.borderColor = 'rgba(255,255,255,0.05)'; 
                        el.style.boxShadow = 'none'; 
                    };
                    
                    const avatarContent = m.url 
                        ? `<img src="${m.url}" alt="${m.name}" onerror="this.outerHTML=DEFAULT_AVATAR">`
                        : DEFAULT_AVATAR;

                    el.innerHTML = `
                        <div class="avatar-box" style="${!m.url ? `background: linear-gradient(180deg, ${roleObj.color}30, #000); border-color: ${roleObj.color}50;` : ''}">
                            ${avatarContent}
                        </div>
                        <div class="info">
                            <b>${m.name}</b>
                            <div class="id-badge" style="color: ${roleObj.color}; border-color: ${roleObj.color}30; background: ${roleObj.color}08;">ID: ${m.id}</div>
                            <p>${m.s || ''}</p>
                        </div>
                    `;
                    grid.appendChild(el);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        fetchAll();
    </script>
</body>
</html>
